scores:
  human_cognition:
    score: 5
    confidence: high
    justification: >
      Go's deliberate minimalism — small surface area, gofmt-canonical formatting, explicit error handling — produces the highest readability and lowest implicit-context score in the cohort.
    supporting_claims: [go-008, go-009, go-010, go-011, go-018]

  machine_cognition:
    score: 4
    confidence: medium
    justification: >
      Static typing with gofmt-canonical syntax regularity; deliberate omission of sum types, late generics, and exhaustive enums keeps the verification ceiling moderate.
    supporting_claims: [go-001, go-002, go-006, go-007, go-014, go-017]

  ai_agent_operability:
    score: 5
    confidence: medium
    justification: >
      Single canonical command (build/test/vet/mod), gofmt as a single canonical formatter, MVS dependency resolution, and gopls as the official LSP server give Go the cleanest agent loop in the cohort.
    supporting_claims: [go-003, go-004, go-012, go-015]

  runtime_ecosystem:
    score: 4
    confidence: high
    justification: >
      Production-grade runtime, cross-platform deployment, and a strong concurrency model via goroutines and channels.
    supporting_claims: [go-005, go-016, go-019]

  strategic_viability:
    score: 4
    confidence: medium
    justification: >
      Google-stewarded language with broad enterprise adoption; deliberate type-system minimalism is a forward concern under verification pressure.
    supporting_claims: [go-013]

  ai_systems_native:
    score: 2.0
    confidence: medium
    justification: >
      The Go team at Google ships encoding/json and the standard library but no AI-specific package; the 2.0 credits stdlib JSON support that AI tooling consumes, but native AI capability is absent.
    supporting_claims: [go-035]

  ai_systems_ecosystem:
    score: 3.5
    confidence: medium
    justification: >
      Go has official Anthropic Go SDK, OpenAI Go SDK, MCP Go SDK, and production Kafka and Postgres clients. The agent-framework ecosystem (LangChainGo) lags Python and TypeScript in feature breadth.
    supporting_claims: [go-020, go-021, go-022, go-023, go-024]

  structured_output_native:
    score: 3.0
    confidence: medium
    justification: >
      encoding/json with struct tags is the canonical Go structured-data parsing path and is steward-shipped. Go's static type system protects the boundary between LLM output and program logic at compile time once the JSON has been parsed.
    supporting_claims: [go-025, go-029]

  structured_output_ecosystem:
    score: 3.0
    confidence: medium
    justification: >
      openai-go generates JSON Schema from Go structs and the invopop/jsonschema project covers types-to-JSON-Schema. Validation is fragmented across go-playground/validator, ozzo-validation, and others without a clear Pydantic/Zod equivalent.
    supporting_claims: [go-026, go-027, go-028]

  ecosystem_dependency_risk:
    score: 3.5
    confidence: medium
    justification: >
      Go's risk profile is anchored at the language layer by Google's stewardship and by commercial-first-party SDKs from Anthropic and OpenAI. The validation-library landscape is community-multi-maintainer and fragmented, and LangChainGo is community-only.
    supporting_claims: [go-030, go-031, go-032, go-033, go-034]

  reachability_to_top_tier:
    score: 3.5
    confidence: medium
    justification: >
      Go's AO already sits at top-tier and Google's predictable release cadence anchors steward capacity [go-037]; Anthropic and OpenAI ship first-party Go SDKs, providing a credible AIE closing path without requiring Google to ship anything [go-038]. Structural blockers: type-system minimalism (no sum types, no exhaustive enums, late generics) is a stated language-design philosophy that won't change, so the MC half-cell gap is structural not investible [go-036]; without Google sponsoring an AI-Go-SDK initiative, AIN closing path is unlikely to compound [go-039]; below-5 cells span MC/AIN/AIE/SOE in a mixed pattern [go-040]. Trajectory is mixed, not unambiguously up.
    supporting_claims: [go-036, go-037, go-038, go-039, go-040]
