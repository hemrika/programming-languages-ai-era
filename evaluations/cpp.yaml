    justification: >
      C++ retains a production-grade compiler toolchain (Clang, GCC, MSVC), ABI stability, deep OS and hardware integration, and broad library availability - all greenfield-relevant ecosystem properties independent of legacy installed-base credit. The dominant accelerator stacks (CUDA, ROCm/HIP, SYCL, oneAPI) primarily target C++ today, extending the forward production-relevance into AI-systems work.
