    supporting_claims: [cpp-001, cpp-006, cpp-007]

  ai_systems_native:
    score: 2.5
    confidence: medium
    justification: >
      ISO C++ ships no AI-specific facilities. The 2.5 credits CUDA, ROCm, SYCL, and oneAPI as commercial-first-party host runtimes that target C++ as the language-of-the-stack — partial native-ish story without first-party-ISO backing.
    supporting_claims: [cpp-032]

  ai_systems_ecosystem:
    score: 3.0
    confidence: medium
    justification: >
      C++ has llama.cpp as the dominant local-inference runtime, ONNX Runtime C++ as a primary binding, CUDA/ROCm/SYCL host runtimes, and librdkafka for streaming. First-party LLM provider SDKs and agent frameworks are essentially absent.
    supporting_claims: [cpp-017, cpp-018, cpp-019, cpp-020, cpp-021]

  structured_output_native:
    score: 1.0
    confidence: high
    justification: >
      ISO C++ has no native reflection (P2996 still in progress), no schema-validation library in the standard library, and no first-party LLM tool-call typing surface; the structured-output native story is essentially absent.
    supporting_claims: [cpp-026]

  structured_output_ecosystem:
    score: 2.0
    confidence: medium
    justification: >
      nlohmann/json is the most widely used C++ JSON library and supports manual mapping; llama.cpp implements native GBNF JSON-schema-constrained decoding. No Pydantic-equivalent validation framework exists; reflection-based schema generation requires Boost.Describe or hand-written code.
    supporting_claims: [cpp-022, cpp-023, cpp-024, cpp-025]

  ecosystem_dependency_risk:
    score: 3.0
    confidence: medium
    justification: >
      C++'s dependency-risk profile mixes strong commercial-first-party backing (CUDA/NVIDIA, ONNX/Microsoft, librdkafka/Confluent) with single-maintainer load-bearing dependencies (llama.cpp/Gerganov, nlohmann/json/Lohmann). The accelerator stack itself is well-funded.
    supporting_claims: [cpp-027, cpp-028, cpp-029, cpp-030, cpp-031]

  reachability_to_top_tier:
    score: 2.0
    confidence: medium
    justification: >
      The only material in-motion signal is P2996 Reflection for C++26, which would lift SON if it lands inside the planning horizon [cpp-034]. Structural blockers dominate: memory-safety regulatory pressure (NSA, ONCD, Microsoft, Chromium) compounds against C++ rather than for it, moving trajectory the other way [cpp-033]; most below-5 cells (HC, AO, SON, AIN) are structural to the language's design and will not close within the planning horizon [cpp-035]; ISO three-yearly revisions trail vendor-stewarded competitors' cadence [cpp-036]; single-maintainer load-bearing libraries (llama.cpp, nlohmann/json) constrain ecosystem trajectory [cpp-037]. Top-tier is functionally out of reach inside a 3–5-year horizon.
    supporting_claims: [cpp-033, cpp-034, cpp-035, cpp-036, cpp-037]
