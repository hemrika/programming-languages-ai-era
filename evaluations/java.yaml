  ai_agent_operability:
    score: 3
    confidence: medium
    justification: >
      Java has rich diagnostics, the Eclipse JDT Language Server exposing the JDT semantic model over LSP, and strong AI-training-corpus density, but build-tool fragmentation, heavier project structure, and slower feedback loops increase agent friction.
    supporting_claims: [java-011, java-014]

  runtime_ecosystem:
    score: 4.5
    confidence: high
    justification: >
      The JVM is a uniquely production-grade target: virtual threads (Java 21+) and structured concurrency (JEP 453) collapse the cost of high-concurrency server work, portable bytecode and verifier give predictable deployment, deep observability and profiling tooling are unmatched in the cohort, and Maven Central is a credible greenfield package distribution. These forward-looking ecosystem-viability properties move the score past the integer-4 line.
    supporting_claims: [java-006, java-009, java-010, java-015]

  strategic_viability:
    score: 3
    confidence: medium
    justification: >
      OpenJDK governance and long-term compatibility commitments are forward-looking strengths. Under greenfield framing, the durable adoption premium that previously lifted Java to 4 is not credited; new-project share is shifting toward Kotlin and other languages in many segments.
    supporting_claims: [java-007, java-008, java-016]

  ai_systems_interoperability:
    score: 3.5
    confidence: medium
    justification: >
      Java has an official Anthropic SDK, LangChain4j as a credible JVM agent framework, an official MCP Java SDK, mature Kafka and JDBC integration, and an official ONNX Runtime Java package. Vector-store SDKs are growing but mostly community-maintained. The infrastructure-grade integration story is strong; the LLM-provider depth trails .NET because Microsoft Semantic Kernel does not have a parallel Java-first agent framework.
    supporting_claims: [java-019, java-020, java-021, java-022, java-023]

  structured_output_maturity:
    score: 3.5
    confidence: medium
    justification: >
      Java has Records (JEP 395), Jackson with Jakarta Bean Validation as the canonical validated-deserialization stack, LangChain4j AI Services for type-safe LLM-interface binding, and JSON Schema generation via Jackson-driven libraries. The boilerplate and library fragmentation prevent the score from reaching .NET-tier; the ecosystem is solid but verbose and less LLM-optimized.
    supporting_claims: [java-024, java-025, java-026, java-027, java-028]
