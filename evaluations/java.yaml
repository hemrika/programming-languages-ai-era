  runtime_ecosystem:
    score: 4
    confidence: high
    justification: >
      The JVM is a production-grade target with mature concurrency primitives (virtual threads, structured concurrency JEP 453), portable bytecode and verifier, deep observability and profiling, and well-organized package distribution via Maven Central. These are forward-looking ecosystem-viability properties a greenfield project can lean on today, evaluated independently of any legacy installed-base credit.
