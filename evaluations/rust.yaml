language: Rust
status: draft
updated: 2026-05-02
framework_version: v0.4

scores:
  human_cognition:
    score: 3
    confidence: medium
    justification: >
      Rust's ownership model carries a real learning curve and the syntactic density of lifetimes, generics, and traits places a higher local-reasoning load than most cohort languages.
    supporting_claims: [rust-005, rust-020]

  machine_cognition:
    score: 5
    confidence: high
    justification: >
      Ownership-checked memory rules without garbage collection, exhaustive match over enums, lifetimes, and the trait system give the strongest verification structure in the cohort.
    supporting_claims: [rust-002, rust-003, rust-006, rust-007, rust-012]

  ai_agent_operability:
    score: 4
    confidence: medium
    justification: >
      rust-analyzer is the official LSP server with a deep semantic model; Cargo is a single canonical workflow tool. Compile times remain a real friction on large workspaces.
    supporting_claims: [rust-004, rust-009, rust-010, rust-021, rust-025]

  runtime_ecosystem:
    score: 4
    confidence: high
    justification: >
      Rust's accelerator/ML ecosystem (wgpu, candle, burn) and Tokio's production-grade async runtime make Rust a credible greenfield choice for AI infrastructure.
    supporting_claims: [rust-001, rust-008, rust-011, rust-017, rust-022, rust-023, rust-026]

  strategic_viability:
    score: 5
    confidence: medium
    justification: >
      Regulatory alignment via NSA recommendations and Android telemetry; broad commercial sponsorship via the Rust Foundation; sustained RFC and Project Goals cadence.
    supporting_claims: [rust-013, rust-014, rust-015, rust-016, rust-018, rust-019, rust-024]

  ai_systems_native:
    score: 1.5
    confidence: high
    justification: >
      The Rust project ships no first-party AI-specific crate. Native AI surface is essentially absent — rust-analyzer and the type system support AI-tooling use cases but no first-party AI runtime exists.
    supporting_claims: [rust-042]

  ai_systems_ecosystem:
    score: 4.0
    confidence: medium
    justification: >
      Rust's third-party AI-systems ecosystem has matured to a 4.0: production-grade Postgres clients (sqlx, tokio-postgres) and Kafka via rdkafka anchor the data layer; HuggingFace's candle ships a credible Rust inference runtime; async-openai is the de-facto OpenAI client; the official MCP Rust SDK lands the protocol surface; and the Rig / swiftide / langchain-rust agent-framework cohort has matured into usable production options. Depth still trails Python and TypeScript on framework breadth, which keeps the score below 4.5.
    supporting_claims: [rust-027, rust-028, rust-029, rust-030, rust-031]

  structured_output_native:
    score: 2.0
    confidence: medium
    justification: >
      Rust's enums + match enforce exhaustive LLM-output discrimination at compile time, which is the strongest pattern-match-exhaustiveness anchor in the cohort. But no schema-validation library ships with the language; Serde is community-multi-maintainer and de facto rather than native.
    supporting_claims: [rust-035]

  structured_output_ecosystem:
    score: 4.0
    confidence: medium
    justification: >
      Serde is the dominant Rust serialization framework with derive-macro generated, type-safe parsers; schemars covers JSON Schema generation; async-openai accepts Serde-typed tool-call arguments. LLM-specific ergonomics (rig, langchain-rust) are younger than Python/TS but well-shaped.
    supporting_claims: [rust-032, rust-033, rust-034, rust-036]

  ecosystem_dependency_risk:
    score: 3.5
    confidence: medium
    justification: >
      Rust's dependency-risk profile is mixed: the Rust Foundation provides multi-vendor language-layer backing, but Serde, schemars, and Rust agent frameworks are community-multi-maintainer with notable bus-factor concentration. candle's HuggingFace backing is the strongest commercial anchor.
    supporting_claims: [rust-037, rust-038, rust-039, rust-040, rust-041]

  reachability_to_top_tier:
    score: 3.5
    confidence: medium
    justification: >
      Rust's MC=5 and SV=5 already sit at top-tier and verification advantage compounds rather than degrades [rust-043]; Rust Foundation's multi-vendor backing (AWS, Microsoft, Google, Mozilla, Huawei) provides durable steward capacity [rust-046]; the AI ecosystem (candle, async-openai, MCP Rust SDK) is maturing slowly but in motion [rust-045]. Structural blockers: compile-time gap is structural to the borrow-check model and unlikely to close materially within 5 years, capping AO trajectory [rust-044]; Rust ships no first-party AI runtime and Rust Foundation does not signal intent to invest in AI tooling, so AIN closing path is steward-absent [rust-047].
    supporting_claims: [rust-043, rust-044, rust-045, rust-046, rust-047]
