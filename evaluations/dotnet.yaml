language: .NET
status: draft
updated: 2026-05-02
framework_version: v0.4

scores:
  human_cognition:
    score: 4
    confidence: medium
    justification: >
      Modern C# is concise and expressive, with records, pattern matching, and nullable reference types improving local reasoning, though the platform surface (project system, MSBuild) adds cognitive load.
    supporting_claims: [dotnet-005]

  machine_cognition:
    score: 4
    confidence: high
    justification: >
      Strong static typing combined with Roslyn's semantic model gives tools and AI systems first-class access to program structure and refactoring primitives.
    supporting_claims: [dotnet-003, dotnet-004, dotnet-007, dotnet-012]

  ai_agent_operability:
    score: 4
    confidence: medium
    justification: >
      Fast incremental builds, strong diagnostics, and Roslyn's semantic-model API for analyzers and code fixes support agent workflows, though project-system quirks and a smaller training-data footprint than TypeScript or Python create friction.
    supporting_claims: [dotnet-006, dotnet-010, dotnet-011, dotnet-014, dotnet-017]

  runtime_ecosystem:
    score: 4
    confidence: high
    justification: >
      The .NET runtime is production-grade, cross-platform, and has deep enterprise library coverage with strong performance.
    supporting_claims: [dotnet-002, dotnet-008, dotnet-009]

  strategic_viability:
    score: 4
    confidence: high
    justification: >
      Microsoft's tight alignment between .NET and AI tooling is a structural tailwind, with a predictable annual major-release cadence and LTS designations supporting forward planning. Open-source mindshare remains smaller than the JVM or Node ecosystems.
    supporting_claims: [dotnet-001, dotnet-013, dotnet-015, dotnet-016, dotnet-018]

  ai_systems_native:
    score: 4.0
    confidence: high
    justification: >
      .NET has the deepest first-party AI surface in the cohort: Microsoft Semantic Kernel as a Microsoft-published agent framework, Microsoft.Extensions.AI as a unified AI surface, ONNX Runtime .NET as a Microsoft-shipped inference runtime, and the OpenAI .NET SDK published by Microsoft. The MCP C# SDK is jointly developed with Microsoft.
    supporting_claims: [dotnet-020, dotnet-021, dotnet-022, dotnet-023]

  ai_systems_ecosystem:
    score: 3.5
    confidence: medium
    justification: >
      Beyond first-party Microsoft tooling, the .NET AI ecosystem includes the Anthropic .NET SDK, third-party vector-store clients on NuGet, and various community wrappers. The non-first-party ecosystem is thinner than Python or TypeScript.
    supporting_claims: [dotnet-019]

  structured_output_native:
    score: 4.0
    confidence: high
    justification: >
      .NET's native structured-output surface is strong: System.Text.Json with source generation, JsonSchemaExporter for native types-to-JSON-Schema in .NET 9, Semantic Kernel function calling with attribute-based parameter binding, Microsoft.Extensions.AI structured outputs, and C# nullable reference types + records giving compile-time contract safety.
    supporting_claims: [dotnet-024, dotnet-025, dotnet-026, dotnet-027, dotnet-028]

  structured_output_ecosystem:
    score: 3.5
    confidence: medium
    justification: >
      The .NET ecosystem structured-output surface includes Newtonsoft.Json (still widely used in legacy codebases though substitutable by System.Text.Json in greenfield), FluentValidation, FastEndpoints, and various community LLM-tooling wrappers. Less LLM-specific ergonomics than Python's Instructor or TypeScript's Vercel AI SDK.
    supporting_claims: []

  ecosystem_dependency_risk:
    score: 4.5
    confidence: high
    justification: >
      .NET's ecosystem dependency risk is the lowest in the cohort: nearly the entire load-bearing AI/SO surface is Microsoft-first-party. The Anthropic .NET SDK adds commercial first-party LLM-vendor backing. Newtonsoft.Json's small-maintainer profile is a non-issue because System.Text.Json is a drop-in replacement.
    supporting_claims: [dotnet-029, dotnet-030, dotnet-031, dotnet-032, dotnet-033]

  reachability_to_top_tier:
    score: 4.5
    confidence: medium
    justification: >
      Microsoft is actively investing across nearly every below-5 cell — Microsoft.Extensions.AI for AIN [dotnet-034], Semantic Kernel and ONNX Runtime .NET and MCP C# SDK across AIN/AIE [dotnet-036], JsonSchemaExporter for SON — and the annual major release cadence with predictable LTS designations supports forward-trajectory bets [dotnet-035]. The HC/MC/AO/RE/SV cells already sit at 4 with small concentrated gaps to top-tier [dotnet-038]. Structural blocker: open-source mindshare smaller than JVM/Node ecosystems caps how much community follow-on lifts the AIE half-cell [dotnet-037]. Net trajectory is unambiguously up.
    supporting_claims: [dotnet-034, dotnet-035, dotnet-036, dotnet-037, dotnet-038]
