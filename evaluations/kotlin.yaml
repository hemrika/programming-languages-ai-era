    justification: >
      The JVM substrate plus Kotlin Multiplatform stable across JVM/Android/iOS/JS/Native gives Kotlin broad runtime and ecosystem coverage.
    supporting_claims: [kotlin-005, kotlin-006, kotlin-007, kotlin-014, kotlin-018, kotlin-019]

  strategic_viability:
    score: 4
    confidence: medium
    justification: >
      JetBrains-stewarded language with strong Android-platform alignment via Google; governance dependence on JetBrains is a forward concern.
    supporting_claims: [kotlin-008, kotlin-009, kotlin-012, kotlin-015, kotlin-020]

  ai_systems_native:
    score: 3.0
    confidence: medium
    justification: >
      JetBrains stewards Kotlin and ships kotlinx-serialization and the Kotlin MCP SDK (jointly with the MCP project). Native AI surface beyond serialization and protocol support is thin; Bumblebee/MLX-equivalent first-party Kotlin AI runtimes do not exist.
    supporting_claims: [kotlin-021, kotlin-023]

  ai_systems_ecosystem:
    score: 3.0
    confidence: medium
    justification: >
      Kotlin's AI-systems ecosystem is dominated by Java-interop libraries (LangChain4j, Anthropic Java SDK, ONNX Runtime Java); Kotlin-native AI tooling beyond the JVM-interop surface is thin.
    supporting_claims: [kotlin-022, kotlin-024]

  structured_output_native:
    score: 3.5
    confidence: medium
    justification: >
      kotlinx-serialization is JetBrains-stewarded (compiler-plugin-driven, type-safe) and sealed classes + exhaustive when give closed-hierarchy LLM-output discrimination at compile time. The native surface is strong but lacks a stewarded LLM tool-call typing library.
    supporting_claims: [kotlin-025, kotlin-026]

  structured_output_ecosystem:
    score: 3.0
    confidence: medium
    justification: >
      Kotlin consumes LangChain4j AI Services and Anthropic Java SDK via JVM interop. Kotlin-native LLM-specific structured-output libraries (Instructor analogues) are essentially absent; community schema-to-JSON-Schema generation is fragmented.
    supporting_claims: [kotlin-027, kotlin-028, kotlin-029]

  ecosystem_dependency_risk:
    score: 4.0
    confidence: medium
    justification: >
      Kotlin's risk profile is strong at the language layer (JetBrains commercial-vendor backing) and via JVM interop (commercial-vendor LangChain4j, OpenJDK). Kotlin-native libraries beyond JetBrains-stewarded ones are thinner and more volatile.
    supporting_claims: [kotlin-030, kotlin-031, kotlin-032, kotlin-033, kotlin-034]

  reachability_to_top_tier:
    score: 4.0
    confidence: medium
    justification: >
      JetBrains stewardship anchors Kotlin as a commercial product with sustained KEEP cadence [kotlin-035]; Kotlin Multiplatform stable provides a credible cross-platform ecosystem path [kotlin-036]; null-safety, sealed types, and pattern-match exhaustiveness already sit at top-tier so remaining gaps concentrate in the (more investible) ecosystem halves rather than language design [kotlin-037]. Structural blockers: Kotlin-native AI ecosystem is materially smaller than JVM-interop projects, so closing AIE on a Kotlin-first basis requires sustained community pickup that is not in motion [kotlin-038]; commercial-vendor governance is durable but tied to a single steward [kotlin-039].
    supporting_claims: [kotlin-035, kotlin-036, kotlin-037, kotlin-038, kotlin-039]
