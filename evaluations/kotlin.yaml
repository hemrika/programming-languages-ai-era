      Both kotlin-language-server and JetBrains' own LSP server expose the Kotlin semantic model; Gradle incremental compilation reduces edit-to-feedback latency.
    supporting_claims: [kotlin-011, kotlin-016]

  runtime_ecosystem:
    score: 4
