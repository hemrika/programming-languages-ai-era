language: Python
status: draft
updated: 2026-05-02
framework_version: v0.4

scores:
  human_cognition:
    score: 4
    confidence: medium
    justification: >
      Python is readable and concise, but large systems can suffer from weak boundaries and implicit runtime behavior.
    supporting_claims: [python-014, python-015]

  machine_cognition:
    score: 3
    confidence: medium
    justification: >
      Python is dynamically typed at heart, but a sustained sequence of typing PEPs (484, 526, 544, 612, 646, 692, 695) and a mature checker ecosystem (mypy, pyright, pydantic) now provide a credible gradual-typing layer that materially improves static analyzability in well-typed codebases.
    supporting_claims: [python-001, python-002, python-003, python-004, python-005, python-016, python-020]

  ai_agent_operability:
    score: 4
    confidence: medium
    justification: >
      Python has fast execution feedback, simple syntax, mature LSP-based type checkers (pyright/Pylance) backed by the typeshed stub ecosystem, and uv-driven fast dependency management; runtime errors and environment issues remain a repair-friction source.
    supporting_claims: [python-006, python-007, python-011, python-018, python-019]

  runtime_ecosystem:
    score: 5
    confidence: high
    justification: >
      Python's ML, data, scripting, and automation ecosystem is the dominant choice for new AI-era projects in those domains. Under greenfield framing the credit is for forward-looking ecosystem velocity (active library maturation around LLM tooling, agentic frameworks, vector stores) rather than legacy code volume.
    supporting_claims: [python-008, python-009, python-010]

  strategic_viability:
    score: 4
    confidence: high
    justification: >
      Python remains the highest-AI-training-corpus-density language, with annual release cadence (PEP 602) and ecosystem velocity in ML/data unmatched. Under greenfield framing the prior 5 reflected partly the installed-base premium, which is no longer scored; the score reduces to 4 with the verification gap counted as a forward concern offset only partially by gradual typing.
    supporting_claims: [python-012, python-013, python-017]

  ai_systems_native:
    score: 1.5
    confidence: high
    justification: >
      Python's PSF stewards the language and core stdlib but ships no AI-specific package first-party. The 1.5 reflects a credit for the typing PEP cadence enabling type-safe Python AI code, but the native AI surface is essentially absent; the entire Python AI position rests on ecosystem libraries.
    supporting_claims: [python-036]

  ai_systems_ecosystem:
    score: 5.0
    confidence: high
    justification: >
      Python has the most complete external AI-systems ecosystem in the cohort: official Anthropic and OpenAI SDKs, the canonical LangChain Python implementation, the Python MCP SDK, and first-party clients for every major vector store. Embedding pipelines, inference runtimes, and observability all expose Python as their primary surface — but every load-bearing piece is community or commercial-third-party rather than language-steward shipped.
    supporting_claims: [python-021, python-022, python-023, python-024, python-025]

  structured_output_native:
    score: 2.5
    confidence: medium
    justification: >
      Python's native structured-output story rests on type hints and dataclasses, with PEP 484 hints not enforced at runtime. The score reflects gradual-typing maturity supporting compile-time-style static-checker validation; the runtime-validation layer that does the actual LLM-output checking is ecosystem.
    supporting_claims: [python-030]

  structured_output_ecosystem:
    score: 5.0
    confidence: high
    justification: >
      Python's external structured-output ecosystem is gold-standard: Pydantic v2 as the dominant schema-validation library, OpenAI SDK Pydantic-native response_format support, Instructor wrapping both OpenAI and Anthropic clients with retries, and Outlines for JSON-Schema-/regex-/grammar-constrained decoding.
    supporting_claims: [python-026, python-027, python-028, python-029]

  ecosystem_dependency_risk:
    score: 2.5
    confidence: medium
    justification: >
      Python's load-bearing AI/SO dependencies sit on a fragile backer mix: Pydantic is community-multi-maintainer, Instructor is single-maintainer, Outlines is small-commercial. OpenAI's SDK embedding Pydantic anchors part of the surface in commercial first-party backing, but the overall risk profile is high relative to .NET or Java.
    supporting_claims: [python-031, python-032, python-033, python-034, python-035]

  reachability_to_top_tier:
    score: 3.5
    confidence: medium
    justification: >
      Python's strongest in-motion signals are the sustained typing-PEP cadence lifting MC over time [python-037] and the commercial-vendor velocity of Astral (uv, ruff) reducing the dependency-risk profile [python-038], both compounding with Python's top GitHub corpus density that AI-coding-assistants amplify each model generation [python-041]. Structural blockers: PSF does not ship first-party AI packages and signals no intent to do so [python-039], leaving AIN structurally bounded; Instructor's single-maintainer concentration caps how much SOE compounds into trajectory [python-040].
    supporting_claims: [python-037, python-038, python-039, python-040, python-041]
