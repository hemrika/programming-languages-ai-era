scores:
  human_cognition:
    score: 3
    confidence: medium
    justification: >
      Concise and expressive for numerical work, but multiple dispatch and the dynamic-with-annotations style require non-trivial mental-model shifts, and behavior often depends on combinations of method definitions distributed across packages.
    supporting_claims: [julia-002, julia-015]

  machine_cognition:
    score: 3
    confidence: medium
    justification: >
      Dynamic at heart and multiple-dispatch resolution complicates static inference, though optional type annotations help local analysis.
    supporting_claims: [julia-006, julia-007, julia-013, julia-016]

  ai_agent_operability:
    score: 2
    confidence: medium
    justification: >
      TTFX latency and a small training corpus slow agent feedback loops, despite good interactive tooling.
    supporting_claims: [julia-004, julia-008, julia-011]

  runtime_ecosystem:
    score: 3
    confidence: medium
    justification: >
      Strong in scientific computing, with first-class GPU backends (CUDA.jl, AMDGPU.jl, Metal.jl, oneAPI.jl) under JuliaGPU; narrower elsewhere, with deployment patterns less standardized than Python.
    supporting_claims: [julia-001, julia-003, julia-005, julia-009, julia-010, julia-014]

  strategic_viability:
    score: 3
    confidence: medium
    justification: >
      Niche but durable in research and scientific computing; unlikely to displace Python broadly in AI/ML.
