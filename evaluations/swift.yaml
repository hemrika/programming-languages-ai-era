  ai_agent_operability:
    score: 3
    confidence: medium
    justification: >
      Strong diagnostics on Apple platforms and the official sourcekit-lsp language server provide a credible LSP integration, but a smaller training corpus and Xcode/SPM build complexity limit cross-platform agent workflows.
