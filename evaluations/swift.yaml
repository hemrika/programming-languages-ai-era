language: Swift
status: draft
updated: 2026-04-30

scores:
  human_cognition:
    score: 4
    confidence: medium
    justification: >
      Swift is concise and expressive with strong local reasoning, though protocol-with-associated-types and generics complexity can raise cognitive load.
    supporting_claims: [swift-012]

  machine_cognition:
    score: 4
    confidence: medium
    justification: >
      Strong static typing and value semantics give tools and AI systems good structural visibility, with mature tooling on Apple platforms.
    supporting_claims: [swift-001, swift-002, swift-005]

  ai_agent_operability:
    score: 3
    confidence: medium
    justification: >
      Strong diagnostics on Apple platforms and the official sourcekit-lsp language server provide a credible LSP integration, but a smaller training corpus and Xcode/SPM build complexity limit cross-platform agent workflows.
    supporting_claims: [swift-007, swift-014]

  runtime_ecosystem:
    score: 4
    confidence: medium
    justification: >
      Production-grade on Apple platforms with strong tooling and performance; concurrency primitives include async/await, structured concurrency, actors, and distributed actors (SE-0336/0344). Server-side Swift on Linux (SwiftNIO, Vapor, AWS Lambda runtime) is increasingly viable, though ecosystem depth still lags mainstream backend languages.
    supporting_claims: [swift-003, swift-004, swift-008, swift-009, swift-015, swift-016, swift-018]

  strategic_viability:
    score: 3
    confidence: medium
    justification: >
      Durable demand within Apple's ecosystem, with limited evidence of broad cross-platform adoption to date.
    supporting_claims: [swift-006, swift-010, swift-011, swift-013, swift-017]

  ai_systems_interoperability:
    score: 2
    confidence: medium
    justification: >
      Swift has strong Apple-platform ML integration via Core ML, Create ML, and MLX, but cross-platform AI integration is thin. There are no first-party Anthropic or OpenAI Swift SDKs, and major agent frameworks do not publish Swift ports. The score reflects an Apple-platform-shaped AI integration story rather than a portable cohort-comparable one.
    supporting_claims: [swift-019, swift-020, swift-021, swift-022, swift-023]

  structured_output_maturity:
    score: 2.5
    confidence: medium
    justification: >
      Swift's Codable is solid and enums with associated values give compile-time-checked discriminated unions. The LLM-specific structured-output ecosystem is thin: community Swift OpenAI clients (swift-openai-responses, MacPaw/OpenAI) cover some surface, no first-party Anthropic or OpenAI Swift SDK exists, and schema-from-types automation for LLM tool calls is largely manual.
    supporting_claims: [swift-024, swift-025, swift-026, swift-027, swift-028]
