      ElixirLS provides LSP support but the BEAM concurrency model imposes a different mental model that agent priors handle less robustly.
    supporting_claims: [elixir-010]

  runtime_ecosystem:
    score: 4.5
    confidence: medium
    justification: >
      BEAM concurrency and OTP supervision trees give Elixir a uniquely production-grade fault-tolerance story; Phoenix LiveView is a credible substrate for real-time AI-augmented UIs.
    supporting_claims: [elixir-001, elixir-002, elixir-003, elixir-004, elixir-008, elixir-009, elixir-011, elixir-014, elixir-017, elixir-018]

  strategic_viability:
    score: 3
    confidence: medium
    justification: >
      Smaller community than the JVM or Node ecosystems; Elixir-team and Dashbit governance is stable but the user pool is the smallest in the cohort.
    supporting_claims: [elixir-013, elixir-015]

  ai_systems_native:
    score: 3.0
    confidence: medium
    justification: >
      Bumblebee (pre-trained transformers on top of Nx) and Nx (numerical-computing library) are Dashbit-stewarded — language-steward-adjacent for the Elixir community. Phoenix.PubSub and GenStage give BEAM-native streaming for AI workloads.
    supporting_claims: [elixir-019, elixir-020, elixir-021]

  ai_systems_ecosystem:
    score: 2.0
    confidence: medium
    justification: >
      Elixir's external AI ecosystem is thin: LLM-provider SDKs are mostly community-maintained (anthropic_ex, openai_ex), the agent-framework ecosystem (Instructor port, LangChain Elixir port) is small.
    supporting_claims: [elixir-022, elixir-023]

  structured_output_native:
    score: 1.5
    confidence: medium
    justification: >
      Elixir's set-theoretic typing is in research and the dynamic runtime means there is no native compile-time contract safety on the LLM-output boundary; pattern matching at runtime is the only language-level discipline.
    supporting_claims: []

  structured_output_ecosystem:
    score: 2.5
    confidence: medium
    justification: >
      Ecto changesets cover runtime schema validation, casting, and constraint checking; instructor_ex provides Elixir Instructor-style structured outputs but the LLM-specific ergonomics and provider coverage trail Python/TS.
    supporting_claims: [elixir-024, elixir-025, elixir-026, elixir-027, elixir-028]

  ecosystem_dependency_risk:
    score: 3.0
    confidence: medium
    justification: >
      Elixir's risk profile is mixed: Bumblebee/Nx and Phoenix are anchored to Dashbit (small commercial steward-adjacent), but instructor_ex is single-maintainer and LLM SDKs are community-multi-maintainer without commercial-first-party backing.
    supporting_claims: [elixir-029, elixir-030, elixir-031, elixir-032, elixir-033]

  reachability_to_top_tier:
    score: 2.5
    confidence: medium
    justification: >
      In-motion signals exist: set-theoretic types are in active research at the Elixir core team, providing a typing closing path that is upward but slow [elixir-034]; Dashbit/Plataformatec stewards Bumblebee and Nx as a small commercial-third-party investment with the AIN closing path in motion but capacity-bounded [elixir-036]. Structural blockers: small ecosystem footprint means closing AIE/SOE half-cells requires sustained community work that has not consistently materialized [elixir-035]; aggregate gap-size to top-tier across MC/AIN/AIE/SON/SOE is wide and unlikely to close inside the planning horizon [elixir-037]; instructor_ex remains a small-maintainer port [elixir-038]. Net trajectory is positive but slow.
    supporting_claims: [elixir-034, elixir-035, elixir-036, elixir-037, elixir-038]
