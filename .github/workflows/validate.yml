name: validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml
      - run: python scripts/validate_evaluations.py
      - run: python scripts/score_summary.py
      - run: python scripts/confidence_heatmap.py
      - run: git diff --exit-code outputs/confidence-heatmap.md
