    publisher: mbknor / Jackson ecosystem
    type: official_tooling_documentation
    url: https://github.com/mbknor/mbknor-jackson-jsonSchema
    notes: Documents Jackson-driven JSON Schema generation from Java types.

  - id: java-src-022
    title: JEP 395 - Records
    publisher: OpenJDK
    type: language_specification
    url: https://openjdk.org/jeps/395
    notes: Documents Java records as a closed-shape immutable data carrier suited to LLM-output deserialization.

  - id: java-src-023
    title: "Jackson FasterXML GitHub Insights"
    publisher: "FasterXML / Jackson"
    type: official_documentation
    url: https://github.com/FasterXML/jackson/graphs/contributors
    notes: "Jackson is multi-maintainer under FasterXML; bus-factor risk is moderate."

  - id: java-src-024
    title: "LangChain4j Repository"
    publisher: "LangChain Inc."
    type: official_documentation
    url: https://github.com/langchain4j/langchain4j
