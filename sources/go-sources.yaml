language: Go
description: >
  Source registry for atomic claims in claims/go.yaml. Each entry resolves a
  go-src-NNN identifier referenced by an atomic claim's `source` field to a
  primary source: official documentation, language specification, or
  reproducible empirical work. Per the methodology in
  outputs/evidence-backed-research-execution-plan.md.

sources:
  - id: go-src-001
    title: The Go Programming Language Specification
    publisher: The Go Authors
    type: language_specification
    url: https://go.dev/ref/spec
    notes: Defines Go syntax, semantics, and the language's intentionally small surface area.

  - id: go-src-002
    title: Effective Go
    publisher: The Go Authors
    type: official_documentation
    url: https://go.dev/doc/effective_go
    notes: Documents idiomatic Go style, including formatting, error handling, and concurrency patterns.

  - id: go-src-003
    title: cmd/go - The Go command
    publisher: The Go Authors
    type: official_tooling_documentation
    url: https://pkg.go.dev/cmd/go
    notes: Documents the standard go command including build, test, fmt, vet, and module commands.

  - id: go-src-004
    title: Go Modules Reference
    publisher: The Go Authors
    type: official_tooling_documentation
    url: https://go.dev/ref/mod
    notes: Defines module versioning, the go.mod file, and minimum version selection for dependencies.

  - id: go-src-005
    title: The Go Memory Model
    publisher: The Go Authors
    type: official_reference
    url: https://go.dev/ref/mem
    notes: Specifies the conditions under which memory operations are observed across goroutines.

  - id: go-src-006
    title: Go 1.18 Release Notes
    publisher: The Go Authors
    type: official_documentation
    year: 2022
    url: https://go.dev/doc/go1.18
    notes: Documents the addition of generics (type parameters) to Go.

  - id: go-src-007
    title: Go 1.22 Release Notes
    publisher: The Go Authors
    type: official_documentation
    year: 2024
    url: https://go.dev/doc/go1.22
    notes: Documents the per-iteration loop variable semantics fix shipped in Go 1.22.

  - id: go-src-008
    title: Go Developer Survey 2024 H1 Results
    publisher: The Go Team / Google
    type: developer_survey
    year: 2024
    url: https://go.dev/blog/survey2024-h1-results
    notes: Annual survey of self-identified Go developers reporting tooling satisfaction and language usage.

  - id: go-src-009
    title: pkg.go.dev - Documentation for the Go ecosystem
    publisher: The Go Authors
    type: official_tooling_documentation
    url: https://pkg.go.dev/about
    notes: Centralized documentation index for Go modules with versioned, machine-generated package docs.

  - id: go-src-010
    title: gofmt command
    publisher: The Go Authors
    type: official_tooling_documentation
    url: https://pkg.go.dev/cmd/gofmt
    notes: Documents the canonical formatting tool that enforces a single official Go style.

  - id: go-src-011
    title: Go FAQ - Why does Go not have feature X?
    publisher: The Go Authors
    type: official_documentation
    url: https://go.dev/doc/faq
    notes: Documents the design rationale behind Go's intentionally small feature set.

  - id: go-src-012
    title: gopls - Go Language Server
    publisher: The Go Authors
    type: official_tooling_documentation
    url: https://github.com/golang/tools/blob/master/gopls/README.md
    notes: Documents gopls as the official Go language server, providing LSP-based semantic-model integration for editors and agents.

  - id: go-src-013
    title: Anthropic Go SDK
    publisher: Anthropic
    type: official_tooling_documentation
    url: https://github.com/anthropics/anthropic-sdk-go
    notes: Official Go client library for the Anthropic Claude API.

  - id: go-src-014
    title: OpenAI Go SDK
    publisher: OpenAI
    type: official_tooling_documentation
    url: https://github.com/openai/openai-go
    notes: Official Go client library for the OpenAI API.

  - id: go-src-015
    title: Model Context Protocol Go SDK
    publisher: Model Context Protocol project
    type: official_tooling_documentation
    url: https://github.com/modelcontextprotocol/go-sdk
    notes: Official Go SDK for the Model Context Protocol.

  - id: go-src-016
    title: confluent-kafka-go and pgx
    publisher: Confluent / pgx project
    type: official_tooling_documentation
    url: https://github.com/confluentinc/confluent-kafka-go
    notes: Production Go Kafka client (Confluent) and the pgx Postgres driver supporting pgvector.

  - id: go-src-017
    title: LangChainGo
    publisher: community
    type: official_tooling_documentation
    url: https://github.com/tmc/langchaingo
    notes: Community Go port of LangChain; documents the more limited integration surface compared to Python and TS LangChain.

  - id: go-src-018
    title: Go encoding/json package documentation
    publisher: Go team
    type: language_specification
    url: https://pkg.go.dev/encoding/json
    notes: Documents the standard-library encoding/json package and struct-tag-based marshaling.

  - id: go-src-019
    title: openai-go SDK
    publisher: OpenAI
    type: official_tooling_documentation
    url: https://github.com/openai/openai-go
    notes: Documents the official OpenAI Go SDK with struct-defined tool-call typing.

  - id: go-src-020
    title: go-playground/validator
    publisher: go-playground
    type: official_tooling_documentation
    url: https://github.com/go-playground/validator
    notes: Documents validator/v10, the most-used Go struct-tag validation library among multiple alternatives.

  - id: go-src-021
    title: invopop/jsonschema
    publisher: Invopop
    type: official_tooling_documentation
    url: https://github.com/invopop/jsonschema
    notes: Documents JSON Schema generation from Go structs via reflection.

  - id: go-src-022
    title: "Go Release Notes"
    publisher: "The Go Project (Google)"
    type: official_documentation
    url: https://go.dev/doc/devel/release
    notes: "Go release notes confirm Google's stewardship of the language and standard library."

  - id: go-src-023
    title: "Anthropic Go SDK Repository"
    publisher: "Anthropic"
    type: official_documentation
    url: https://github.com/anthropics/anthropic-sdk-go
    notes: "Anthropic publishes the Go SDK as a first-party client."

  - id: go-src-024
    title: "go-playground/validator"
    publisher: "go-playground / community"
    type: official_documentation
    url: https://github.com/go-playground/validator
    notes: "go-playground/validator is the most-used Go validator but is community-maintained without a dominant single steward."

  - id: go-src-025
    title: "LangChainGo Repository"
    publisher: "tmc / community"
    type: official_documentation
    url: https://github.com/tmc/langchaingo
    notes: "LangChainGo is a community-maintained Go LangChain port; LangChain Inc. does not officially publish it."

  - id: go-src-026
    title: "confluent-kafka-go Repository"
    publisher: "Confluent"
    type: official_documentation
    url: https://github.com/confluentinc/confluent-kafka-go
    notes: "Confluent publishes the Go Kafka client as a commercial OSS project."

  - id: go-src-027
    title: "Go Standard Library Index"
    publisher: "The Go Project (Google)"
    type: official_documentation
    url: https://pkg.go.dev/std
    notes: "Go std library index does not include AI-specific packages; golang.org/x experimental tree similarly omits AI tooling."
