language: Swift
description: >
  Source registry for atomic claims in claims/swift.yaml. Each entry resolves a
  swift-src-NNN identifier referenced by an atomic claim's `source` field to a
  primary source: The Swift Programming Language book, Swift Evolution proposals,
  or Apple Developer documentation. Per the methodology in
  outputs/evidence-backed-research-execution-plan.md.

sources:
  - id: swift-src-001
    title: The Swift Programming Language - The Basics
    publisher: Apple Inc.
    type: official_documentation
    url: https://docs.swift.org/swift-book/documentation/the-swift-programming-language/thebasics/
    notes: Introduces Swift type system fundamentals including optionals and value types.

  - id: swift-src-002
    title: The Swift Programming Language - Optional Chaining
    publisher: Apple Inc.
    type: official_documentation
    url: https://docs.swift.org/swift-book/documentation/the-swift-programming-language/optionalchaining/
    notes: Documents how Swift uses optionals to express the absence of values in the type system.

  - id: swift-src-003
    title: The Swift Programming Language - Protocols
    publisher: Apple Inc.
    type: official_documentation
    url: https://docs.swift.org/swift-book/documentation/the-swift-programming-language/protocols/
    notes: Documents Swift protocols including protocol-oriented programming and protocol-with-associated-types.

  - id: swift-src-004
    title: The Swift Programming Language - Concurrency
    publisher: Apple Inc.
    type: official_documentation
    url: https://docs.swift.org/swift-book/documentation/the-swift-programming-language/concurrency/
    notes: Documents async/await, structured concurrency, and actors in Swift.

  - id: swift-src-005
    title: The Swift Programming Language - Memory Safety
    publisher: Apple Inc.
    type: official_documentation
    url: https://docs.swift.org/swift-book/documentation/the-swift-programming-language/memorysafety/
    notes: Documents Swift's memory-safety guarantees and conflicting-access checking.

  - id: swift-src-006
    title: Swift Evolution Process
    publisher: Swift project
    type: official_governance_documentation
    url: https://github.com/swiftlang/swift-evolution
    notes: Documents the open Swift Evolution process and proposal lifecycle.

  - id: swift-src-007
    title: Swift Package Manager - Documentation
    publisher: Swift project
    type: official_tooling_documentation
    url: https://www.swift.org/documentation/package-manager/
    notes: Documents SPM as the official Swift dependency and build manager.

  - id: swift-src-008
    title: SwiftNIO README
    publisher: Apple
    type: official_documentation
    url: https://github.com/apple/swift-nio
    notes: Documents SwiftNIO as a non-blocking I/O event-driven networking framework for server-side Swift.

  - id: swift-src-009
    title: Vapor Documentation - Welcome
    publisher: Vapor project
    type: official_documentation
    url: https://docs.vapor.codes/
    notes: Documents Vapor as a server-side Swift web framework.

  - id: swift-src-010
    title: The Swift Programming Language - Structures and Classes
    publisher: Apple Inc.
    type: official_documentation
    url: https://docs.swift.org/swift-book/documentation/the-swift-programming-language/classesandstructures/
    notes: Documents Swift's value-type structs versus reference-type classes.

  - id: swift-src-011
    title: Apple Developer - Swift
    publisher: Apple Inc.
    type: official_documentation
    url: https://developer.apple.com/swift/
    notes: Apple's official Swift landing page positioning the language across Apple platforms.

  - id: swift-src-012
    title: sourcekit-lsp - Swift Language Server
    publisher: Swift project / Apple
    type: official_tooling_documentation
    url: https://github.com/swiftlang/sourcekit-lsp
    notes: Documents sourcekit-lsp as the official Language Server Protocol implementation for Swift, C, and C++ exposing the SourceKit semantic model.

  - id: swift-src-013
    title: SE-0336 - Distributed Actor Isolation
    publisher: Swift project
    type: official_governance_documentation
    year: 2022
    url: https://github.com/swiftlang/swift-evolution/blob/main/proposals/0336-distributed-actor-isolation.md
    notes: Introduces distributed actor isolation rules for Swift, extending the actor model to location-transparent distributed systems.

  - id: swift-src-014
    title: Core ML and Create ML
    publisher: Apple
    type: official_documentation
    url: https://developer.apple.com/documentation/coreml
    notes: Apple's first-party on-device inference and training frameworks.

  - id: swift-src-015
    title: Swift Server AI tooling state
    publisher: Apple / Swift Server
    type: official_documentation
    url: https://www.swift.org/documentation/server/
    notes: Documents that Apple's primary AI tooling targets Apple platforms; cross-platform Swift AI tooling is thin.

  - id: swift-src-016
    title: Community Swift OpenAI / Anthropic clients
    publisher: community (MacPaw / Anthropic-Swift)
    type: official_tooling_documentation
    url: https://github.com/MacPaw/OpenAI
    notes: Dominant community Swift OpenAI client; documents the absence of first-party Anthropic/OpenAI Swift SDKs.

  - id: swift-src-017
    title: Cross-platform agent-framework absence note for Swift
    publisher: community
    type: official_tooling_documentation
    url: https://github.com/ml-explore/mlx-swift
    notes: Documents the absence of major agent frameworks targeting Swift as of 2026.

  - id: swift-src-018
    title: MLX - Apple Silicon ML framework with Swift bindings
    publisher: Apple
    type: official_documentation
    url: https://github.com/ml-explore/mlx
    notes: Apple's array framework for ML on Apple Silicon, with Swift bindings.

  - id: swift-src-019
    title: Swift Codable documentation
    publisher: Apple
    type: language_specification
    url: https://developer.apple.com/documentation/swift/codable
    notes: Documents the Codable protocol as Swift's standard-library type-safe (de)serialization mechanism.

  - id: swift-src-020
    title: Swift enums documentation
    publisher: Apple
    type: language_specification
    url: https://docs.swift.org/swift-book/documentation/the-swift-programming-language/enumerations/
    notes: Documents Swift enums with associated values and exhaustive switch as Swift's sum-type construct.

  - id: swift-src-021
    title: swift-openai-responses
    publisher: m1guelpf / community
    type: official_tooling_documentation
    url: https://github.com/m1guelpf/swift-openai-responses
    notes: Community Swift client for the OpenAI Responses API with structured-output support.

  - id: swift-src-022
    title: MLX Swift
    publisher: Apple / ml-explore
    type: official_tooling_documentation
    url: https://github.com/ml-explore/mlx-swift
    notes: Documents the Swift bindings for MLX, Apple's array framework for machine learning.

  - id: swift-src-023
    title: "About Swift"
    publisher: "Apple / Swift project"
    type: official_documentation
    url: https://swift.org/about/
    notes: "swift.org documents Apple's role as Swift steward."

  - id: swift-src-024
    title: "MacPaw OpenAI Swift Client"
    publisher: "MacPaw / community"
    type: official_documentation
    url: https://github.com/MacPaw/OpenAI
    notes: "MacPaw maintains a community Swift OpenAI client; no first-party Anthropic/OpenAI Swift SDK exists."

  - id: swift-src-025
    title: "MLX Repository"
    publisher: "Apple"
    type: official_documentation
    url: https://github.com/ml-explore/mlx
    notes: "Apple publishes MLX with strong Apple Silicon focus; cross-platform Swift AI tooling is thinner."

  - id: swift-src-026
    title: "Swift Server work group"
    publisher: "Swift Server work group"
    type: official_documentation
    url: https://swift.org/server/
    notes: "Swift Server work group docs do not list a commercial agent-framework project as supported."

  - id: swift-src-027
    title: "Swift Server Workgroup"
    publisher: "Swift Server Workgroup"
    type: official_documentation
    url: https://swift.org/sswg/
    notes: "SSWG documents Apple's involvement in cross-platform Swift but Apple-platform tooling is the funded surface."
