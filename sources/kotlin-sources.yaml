language: Kotlin
description: >
  Source registry for atomic claims in claims/kotlin.yaml. Each entry resolves a
  kotlin-src-NNN identifier referenced by an atomic claim's `source` field to a
  primary source: Kotlin language documentation, language specification, or
  reproducible empirical work. Per the methodology in
  outputs/evidence-backed-research-execution-plan.md.

sources:
  - id: kotlin-src-001
    title: Kotlin Language Documentation - Null safety
    publisher: JetBrains
    type: official_documentation
    url: https://kotlinlang.org/docs/null-safety.html
    notes: Documents Kotlin's null-safety distinction between nullable and non-nullable reference types.

  - id: kotlin-src-002
    title: Kotlin Language Specification
    publisher: JetBrains
    type: language_specification
    url: https://kotlinlang.org/spec/
    notes: Formal specification of Kotlin including type system, control flow, and overload resolution.

  - id: kotlin-src-003
    title: Kotlin Documentation - Java interop
    publisher: JetBrains
    type: official_documentation
    url: https://kotlinlang.org/docs/java-interop.html
    notes: Documents bidirectional Java/Kotlin interoperability.

  - id: kotlin-src-004
    title: Kotlin Documentation - Sealed classes and interfaces
    publisher: JetBrains
    type: official_documentation
    url: https://kotlinlang.org/docs/sealed-classes.html
    notes: Documents sealed class hierarchies for restricted subclassing and exhaustive matching.

  - id: kotlin-src-005
    title: Kotlin Documentation - Data classes
    publisher: JetBrains
    type: official_documentation
    url: https://kotlinlang.org/docs/data-classes.html
    notes: Documents data classes with synthesized equals, hashCode, toString, and copy.

  - id: kotlin-src-006
    title: Kotlin Coroutines Guide
    publisher: JetBrains
    type: official_documentation
    url: https://kotlinlang.org/docs/coroutines-guide.html
    notes: Documents coroutines as a structured-concurrency model with suspend functions.

  - id: kotlin-src-007
    title: Kotlin Multiplatform Documentation
    publisher: JetBrains
    type: official_documentation
    url: https://kotlinlang.org/docs/multiplatform.html
    notes: Documents Kotlin Multiplatform for sharing code across JVM, Android, iOS, web, and native targets.

  - id: kotlin-src-008
    title: Develop Android apps with Kotlin
    publisher: Google / Android Developers
    type: official_documentation
    url: https://developer.android.com/kotlin
    notes: Documents Google's official position on Kotlin as the preferred language for Android development.

  - id: kotlin-src-009
    title: Kotlin Documentation - Idioms (when expression)
    publisher: JetBrains
    type: official_documentation
    url: https://kotlinlang.org/docs/control-flow.html#when-expression
    notes: Documents the when expression including exhaustiveness requirements when used as an expression.

  - id: kotlin-src-010
    title: The State of Developer Ecosystem 2023 - Kotlin
    publisher: JetBrains
    type: developer_survey
    year: 2023
    url: https://www.jetbrains.com/lp/devecosystem-2023/kotlin/
    notes: Reports Kotlin developer demographics, primary use cases, and tooling preferences.

  - id: kotlin-src-011
    title: Kotlin Documentation - Compiler options and incremental compilation
    publisher: JetBrains
    type: official_tooling_documentation
    url: https://kotlinlang.org/docs/gradle-compilation-and-caches.html
    notes: Documents Kotlin Gradle incremental compilation and caching options.

  - id: kotlin-src-012
    title: Kotlin Documentation - Asynchronous Flow
    publisher: JetBrains
    type: official_documentation
    url: https://kotlinlang.org/docs/flow.html
    notes: Documents Kotlin Flow as a cold asynchronous reactive streams primitive built on suspend functions and coroutines.

  - id: kotlin-src-013
    title: Kotlin Multiplatform is Stable
    publisher: JetBrains
    type: official_governance_documentation
    year: 2023
    url: https://blog.jetbrains.com/kotlin/2023/11/kotlin-multiplatform-stable/
    notes: JetBrains announcement marking Kotlin Multiplatform as stable across JVM, Android, iOS, JS, and Native targets.

  - id: kotlin-src-014
    title: Kotlin Language Server (LSP) - Documentation and Implementations
    publisher: JetBrains / fwcd Kotlin Language Server project
    type: official_tooling_documentation
    url: https://github.com/fwcd/kotlin-language-server
    notes: Documents the community LSP implementation and JetBrains' alignment with the Language Server Protocol for Kotlin tooling integration.

  - id: kotlin-src-015
    title: Model Context Protocol Kotlin SDK
    publisher: Model Context Protocol project / JetBrains
    type: official_tooling_documentation
    url: https://github.com/modelcontextprotocol/kotlin-sdk
    notes: Official Kotlin SDK for the Model Context Protocol.

  - id: kotlin-src-016
    title: LangChain4j (Kotlin via Java interop)
    publisher: LangChain4j project
    type: official_tooling_documentation
    url: https://github.com/langchain4j/langchain4j
    notes: LangChain4j Java agent framework, consumable from Kotlin via interop.

  - id: kotlin-src-017
    title: Kotlin Multiplatform
    publisher: JetBrains
    type: official_documentation
    url: https://www.jetbrains.com/kotlin-multiplatform/
    notes: Documents Kotlin Multiplatform's support for sharing code across JVM, Android, iOS, JS, and Native.

  - id: kotlin-src-018
    title: Kotlin AI ecosystem state notes
    publisher: JetBrains / community
    type: official_tooling_documentation
    url: https://kotlinlang.org/docs/multiplatform.html
    notes: Documents the dominance of JVM-interop libraries over Kotlin-native AI tooling.

  - id: kotlin-src-019
    title: Kotlin Serialization documentation
    publisher: JetBrains
    type: official_tooling_documentation
    url: https://kotlinlang.org/docs/serialization.html
    notes: Documents kotlinx.serialization as the official JetBrains-maintained Kotlin serialization framework.

  - id: kotlin-src-020
    title: Kotlin Sealed classes and interfaces
    publisher: JetBrains
    type: language_specification
    url: https://kotlinlang.org/docs/sealed-classes.html
    notes: Documents sealed classes and exhaustive when as Kotlin's closed sum-type construct.

  - id: kotlin-src-021
    title: LangChain4j - Kotlin usage
    publisher: LangChain4j project
    type: official_tooling_documentation
    url: https://docs.langchain4j.dev/get-started
    notes: Documents LangChain4j use from Kotlin via JVM interop with Kotlin data classes as AI-Service return types.

  - id: kotlin-src-022
    title: kotlinx-serialization JSON Schema community modules
    publisher: kotlinx ecosystem / community
    type: official_tooling_documentation
    url: https://github.com/Kantis/ks3
    notes: Community modules cover JSON Schema generation from kotlinx.serialization-annotated types.

  - id: kotlin-src-023
    title: Kotlin LLM library landscape
    publisher: kotlinlang community
    type: official_tooling_documentation
    url: https://kotlinlang.org/docs/data-science-overview.html
    notes: Kotlin data-science overview indicates LLM-tooling primarily flows through JVM/Java ecosystem rather than Kotlin-native libraries.

  - id: kotlin-src-024
    title: "kotlinx.serialization Repository"
    publisher: "JetBrains / Kotlin"
    type: official_documentation
    url: https://github.com/Kotlin/kotlinx.serialization
    notes: "JetBrains owns the Kotlin/kotlinx.serialization repo."

  - id: kotlin-src-025
    title: "MCP Kotlin SDK Repository"
    publisher: "Model Context Protocol project / JetBrains"
    type: official_documentation
    url: https://github.com/modelcontextprotocol/kotlin-sdk
    notes: "Repo README documents JetBrains co-maintenance."

  - id: kotlin-src-026
    title: "LangChain4j Repository (Kotlin via JVM interop)"
    publisher: "LangChain Inc."
    type: official_documentation
    url: https://github.com/langchain4j/langchain4j
    notes: "Kotlin code consumes LangChain4j directly; substitutability is high but inherits LangChain Inc. funding-durability profile."

  - id: kotlin-src-027
    title: "Kotlin Community Page"
    publisher: "Kotlin Community"
    type: official_documentation
    url: https://kotlinlang.org/community/
    notes: "Kotlin community-maintained AI libraries are smaller than JVM-interop libraries and have thinner contributor pools."

  - id: kotlin-src-028
    title: "JetBrains Kotlin Blog"
    publisher: "JetBrains"
    type: official_documentation
    url: https://blog.jetbrains.com/kotlin/
    notes: "JetBrains publishes Kotlin product roadmaps; the language is a JetBrains commercial product."

  - id: kotlin-src-029
    title: "LangChain4j AI Services - Kotlin usage"
    publisher: "LangChain4j project"
    type: official_tooling_documentation
    url: https://docs.langchain4j.dev/tutorials/ai-services
    notes: "LangChain4j AI Services bind Java/Kotlin interfaces to LLM tool calls and structured outputs; the canonical JVM path for LLM-structured-output ergonomics is via Java-interop rather than a Kotlin-native Instructor/Zod-equivalent."
