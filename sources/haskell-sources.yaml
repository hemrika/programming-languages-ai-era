language: Haskell
description: >
  Source registry for atomic claims in claims/haskell.yaml. Each entry resolves a
  haskell-src-NNN identifier referenced by an atomic claim's `source` field to a
  primary source: the Haskell 2010 Language Report, GHC documentation, the Liquid
  Haskell paper, or build-tool documentation. Per the methodology in
  outputs/evidence-backed-research-execution-plan.md.

sources:
  - id: haskell-src-001
    title: Haskell 2010 Language Report
    publisher: Haskell.org
    type: language_specification
    year: 2010
    url: https://www.haskell.org/onlinereport/haskell2010/
    notes: The Haskell 2010 standard, defining Haskell's syntax, type system, and lazy evaluation.

  - id: haskell-src-002
    title: GHC User's Guide
    publisher: GHC Team
    type: official_documentation
    url: https://downloads.haskell.org/ghc/latest/docs/users_guide/
    notes: Documents GHC, the de facto Haskell compiler, and its language extensions.

  - id: haskell-src-003
    title: Liquid Haskell - Refinement Types for Haskell
    authors: [Vazou, Niki, Seidel, Eric L., Jhala, Ranjit, Vytiniotis, Dimitrios, Peyton Jones, Simon]
    publisher: ICFP
    type: academic_paper
    year: 2014
    url: https://goto.ucsd.edu/~rjhala/papers/refinement_types_for_haskell.pdf
    notes: Introduces Liquid Haskell, a refinement-type system layered over Haskell.

  - id: haskell-src-004
    title: Cabal User's Guide
    publisher: Haskell.org
    type: official_tooling_documentation
    url: https://cabal.readthedocs.io/en/stable/
    notes: Documents Cabal, Haskell's reference build and package system.

  - id: haskell-src-005
    title: The Haskell Tool Stack Documentation
    publisher: Stack project
    type: official_tooling_documentation
    url: https://docs.haskellstack.org/en/stable/
    notes: Documents Stack, an alternative Haskell build tool layered on Cabal-the-library with curated snapshots.

  - id: haskell-src-006
    title: Hackage - The Haskell Package Repository
    publisher: Haskell.org
    type: official_tooling_documentation
    url: https://hackage.haskell.org/
    notes: The central package repository for Haskell open-source libraries.

  - id: haskell-src-007
    title: Hoogle - Haskell API Search
    publisher: Haskell.org
    type: official_tooling_documentation
    url: https://hoogle.haskell.org/
    notes: Search engine that finds Haskell functions by name or by type signature.

  - id: haskell-src-008
    title: GHC User's Guide - Language extensions
    publisher: GHC Team
    type: official_documentation
    url: https://downloads.haskell.org/ghc/latest/docs/users_guide/exts.html
    notes: Documents the large set of GHC language extensions used in modern Haskell code.

  - id: haskell-src-009
    title: Haskell 2010 Language Report - Concurrent and parallel evaluation
    publisher: Haskell.org
    type: language_specification
    year: 2010
    url: https://www.haskell.org/onlinereport/haskell2010/haskellch24.html
    notes: Outlines lazy evaluation and the semantics chapter relevant to performance reasoning.

  - id: haskell-src-010
    title: GHC User's Guide - Profiling
    publisher: GHC Team
    type: official_documentation
    url: https://downloads.haskell.org/ghc/latest/docs/users_guide/profiling.html
    notes: Documents profiling tools for diagnosing performance and space behavior under lazy evaluation.
