language: Elixir
description: >
  Source registry for atomic claims in claims/elixir.yaml. Each entry resolves an
  elixir-src-NNN identifier referenced by an atomic claim's `source` field to a
  primary source: Elixir documentation, Erlang/OTP documentation, the Phoenix
  framework documentation, or Elixir core-team blog posts. Per the methodology
  in outputs/evidence-backed-research-execution-plan.md.

sources:
  - id: elixir-src-001
    title: Elixir Documentation - Introduction
    publisher: Elixir core team
    type: official_documentation
    url: https://elixir-lang.org/getting-started/introduction.html
    notes: Introduces Elixir as a dynamic, functional language built on the Erlang VM.

  - id: elixir-src-002
    title: Erlang/OTP Documentation - System Principles
    publisher: Ericsson AB
    type: official_documentation
    url: https://www.erlang.org/doc/system/system_principles.html
    notes: Documents OTP design principles including supervision trees and fault tolerance.

  - id: elixir-src-003
    title: Erlang/OTP Documentation - Supervision Principles
    publisher: Ericsson AB
    type: official_documentation
    url: https://www.erlang.org/doc/system/sup_princ.html
    notes: Documents the supervision principles underlying OTP applications, used by Elixir.

  - id: elixir-src-004
    title: Erlang/OTP Documentation - Hot Code Replacement
    publisher: Ericsson AB
    type: official_documentation
    url: https://www.erlang.org/doc/system/release_handling.html
    notes: Documents code upgrade and release-handling support in OTP.

  - id: elixir-src-005
    title: Elixir Documentation - Processes
    publisher: Elixir core team
    type: official_documentation
    url: https://elixir-lang.org/getting-started/processes.html
    notes: Documents Elixir's lightweight processes and message-passing model.

  - id: elixir-src-006
    title: Phoenix Framework Documentation - Overview
    publisher: Phoenix Framework team
    type: official_documentation
    url: https://hexdocs.pm/phoenix/overview.html
    notes: Documents the Phoenix web framework for Elixir.

  - id: elixir-src-007
    title: Phoenix LiveView Documentation
    publisher: Phoenix Framework team
    type: official_documentation
    url: https://hexdocs.pm/phoenix_live_view/
    notes: Documents Phoenix LiveView, server-rendered live web applications over WebSockets.

  - id: elixir-src-008
    title: Dialyzer - Erlang/OTP documentation
    publisher: Ericsson AB
    type: official_tooling_documentation
    url: https://www.erlang.org/doc/man/dialyzer.html
    notes: Documents the Dialyzer success-typing static analyzer for Erlang and Elixir.

  - id: elixir-src-009
    title: My Future with Elixir - set-theoretic types
    authors: [Valim, Jose]
    publisher: elixir-lang.org blog
    type: official_governance_documentation
    year: 2023
    url: https://elixir-lang.org/blog/2023/06/22/type-system-updates-research-dev/
    notes: Outlines the research program for introducing set-theoretic types into Elixir.

  - id: elixir-src-010
    title: Hex - The package manager for the Erlang ecosystem
    publisher: Hex.pm
    type: official_tooling_documentation
    url: https://hex.pm/
    notes: Documents Hex as the package manager shared by Elixir and Erlang.

  - id: elixir-src-011
    title: Mix - Elixir build tool
    publisher: Elixir core team
    type: official_tooling_documentation
    url: https://hexdocs.pm/mix/Mix.html
    notes: Documents Mix as Elixir's build tool for tasks, dependencies, and project lifecycle.

  - id: elixir-src-012
    title: Elixir CHANGELOG
    publisher: Elixir core team
    type: official_documentation
    url: https://github.com/elixir-lang/elixir/blob/main/CHANGELOG.md
    notes: Public changelog tracking Elixir release-to-release changes; representative of the language's forward evolution cadence.

  - id: elixir-src-013
    title: Bumblebee - Pre-trained transformer models for Elixir
    publisher: elixir-nx
    type: official_tooling_documentation
    url: https://github.com/elixir-nx/bumblebee
    notes: Native Elixir transformer inference on top of Nx and EXLA.

  - id: elixir-src-014
    title: Nx - Numerical Elixir
    publisher: elixir-nx
    type: official_tooling_documentation
    url: https://github.com/elixir-nx/nx
    notes: Canonical Elixir tensor library underpinning Bumblebee, with EXLA and Torchx backends.

  - id: elixir-src-015
    title: Phoenix.PubSub and GenStage
    publisher: Phoenix Framework / Elixir community
    type: official_documentation
    url: https://hexdocs.pm/phoenix_pubsub/
    notes: BEAM-native streaming and back-pressure primitives.

  - id: elixir-src-016
    title: Elixir LLM-provider community SDKs
    publisher: community
    type: official_tooling_documentation
    url: https://github.com/zoedsoupe/anthropic
    notes: Documents the community-maintained nature of Elixir LLM provider clients.

  - id: elixir-src-017
    title: Instructor for Elixir / LangChain Elixir port
    publisher: community
    type: official_tooling_documentation
    url: https://github.com/thmsmlr/instructor_ex
    notes: Documents the smaller Elixir agent-framework ecosystem.

  - id: elixir-src-018
    title: Ecto.Changeset documentation
    publisher: Elixir Ecto project
    type: official_tooling_documentation
    url: https://hexdocs.pm/ecto/Ecto.Changeset.html
    notes: Documents Ecto changesets as Elixir's canonical runtime data validation and casting construct.

  - id: elixir-src-019
    title: instructor_ex
    publisher: thmsmlr / Elixir community
    type: official_tooling_documentation
    url: https://github.com/thmsmlr/instructor_ex
    notes: Documents the Elixir port of the Instructor pattern returning Ecto-validated structured LLM outputs.

  - id: elixir-src-020
    title: Elixir set-theoretic types research
    publisher: Elixir core team
    type: official_documentation
    url: https://elixir-lang.org/blog/2023/06/22/type-system-updates-research-dev/
    notes: Documents the set-theoretic types work as ongoing research, not a stable language-level type system.

  - id: elixir-src-021
    title: "Nx Repository"
    publisher: "Dashbit / elixir-nx"
    type: official_documentation
    url: https://github.com/elixir-nx/nx
    notes: "Dashbit drives Nx and Bumblebee development; José Valim leads."

  - id: elixir-src-022
    title: "instructor_ex Repository"
    publisher: "Thomas Millar (thmsmlr)"
    type: official_documentation
    url: https://github.com/thmsmlr/instructor_ex
    notes: "instructor_ex contributor graph shows thmsmlr as the dominant maintainer."

  - id: elixir-src-023
    title: "openai_ex on Hex.pm"
    publisher: "Elixir community"
    type: official_documentation
    url: https://hex.pm/packages/openai
    notes: "Hex.pm shows community Elixir LLM clients; no first-party SDK."

  - id: elixir-src-024
    title: "Phoenix Framework Repository"
    publisher: "Phoenix core team / Dashbit"
    type: official_documentation
    url: https://github.com/phoenixframework/phoenix
    notes: "Phoenix is led by Chris McCord with Dashbit and contributors; closely tied to Elixir stewardship."

  - id: elixir-src-025
    title: "Hex.pm Package Repository"
    publisher: "Hex.pm"
    type: official_documentation
    url: https://hex.pm/
    notes: "Hex.pm catalogs Elixir packages; manual review confirms the community/language-steward split."
