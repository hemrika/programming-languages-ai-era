language: C++
description: >
  Source registry for atomic claims in claims/cpp.yaml. Each entry resolves a
  cpp-src-NNN identifier referenced by an atomic claim's `source` field to a
  primary source: ISO C++ standards, government cybersecurity guidance, or
  industry case studies. Per the methodology in
  outputs/evidence-backed-research-execution-plan.md.

sources:
  - id: cpp-src-001
    title: ISO/IEC 14882:2020 Programming languages - C++
    publisher: International Organization for Standardization
    type: language_specification
    year: 2020
    url: https://www.iso.org/standard/79358.html
    notes: The C++20 international standard, which adds modules, concepts, ranges, and coroutines.

  - id: cpp-src-002
    title: ISO/IEC 14882:2017 Programming languages - C++
    publisher: International Organization for Standardization
    type: language_specification
    year: 2017
    url: https://www.iso.org/standard/68564.html
    notes: The C++17 international standard.

  - id: cpp-src-003
    title: ISO/IEC 14882:2024 Programming languages - C++
    publisher: International Organization for Standardization
    type: language_specification
    year: 2024
    url: https://www.iso.org/standard/83626.html
    notes: The C++23 international standard published in 2024.

  - id: cpp-src-004
    title: C++ Core Guidelines
    publisher: Standard C++ Foundation (Bjarne Stroustrup, Herb Sutter)
    type: official_documentation
    url: https://isocpp.github.io/CppCoreGuidelines/CppCoreGuidelines
    notes: Curated guidelines for writing modern C++ safely and effectively.

  - id: cpp-src-005
    title: We need a safer systems programming language
    authors: [Levick, Gavin]
    publisher: Microsoft Security Response Center
    type: industry_case_study
    year: 2019
    url: https://msrc.microsoft.com/blog/2019/07/we-need-a-safer-systems-programming-language/
    notes: Reports that approximately 70% of CVEs Microsoft assigns are memory-safety issues.

  - id: cpp-src-006
    title: Memory safety
    publisher: The Chromium Projects
    type: industry_case_study
    url: https://www.chromium.org/Home/chromium-security/memory-safety/
    notes: Reports that approximately 70% of high-severity Chromium security bugs are memory-safety bugs.

  - id: cpp-src-007
    title: Software Memory Safety - Cybersecurity Information Sheet
    publisher: National Security Agency (NSA), United States
    type: government_guidance
    year: 2022
    url: https://media.defense.gov/2022/Nov/10/2003112742/-1/-1/0/CSI_SOFTWARE_MEMORY_SAFETY.PDF
    notes: Recommends shifting from memory-unsafe languages including C and C++ to memory-safe languages.

  - id: cpp-src-008
    title: Back to the Building Blocks - A Path Toward Secure and Measurable Software
    publisher: Office of the National Cyber Director, The White House
    type: government_guidance
    year: 2024
    url: https://www.whitehouse.gov/wp-content/uploads/2024/02/Final-ONCD-Technical-Report.pdf
    notes: Recommends use of memory-safe programming languages and cites C and C++ as memory-unsafe.

  - id: cpp-src-009
    title: Memory Safe Languages in Android 13
    authors: [Vander Stoep, Jeff, Hines, Stephen]
    publisher: Google Security Blog
    type: industry_case_study
    year: 2022
    url: https://security.googleblog.com/2022/12/memory-safe-languages-in-android-13.html
    notes: Reports a decline in Android memory-safety vulnerabilities as native code shifts away from C and C++ to memory-safe languages.

  - id: cpp-src-010
    title: cppreference.com
    publisher: cppreference.com community
    type: official_reference
    url: https://en.cppreference.com/w/
    notes: Community-maintained C and C++ reference site widely used as a practical companion to ISO standards.

  - id: cpp-src-011
    title: C++20 Modules - cppreference
    publisher: cppreference.com community
    type: official_reference
    url: https://en.cppreference.com/w/cpp/language/modules
    notes: Documents the C++20 modules feature intended to replace header-based inclusion.

  - id: cpp-src-012
    title: CUDA C++ Programming Guide
    publisher: NVIDIA Corporation
    type: official_documentation
    url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/
    notes: Documents NVIDIA's CUDA C++ programming model; representative of the broader ecosystem (CUDA, AMD ROCm/HIP, Khronos SYCL, Intel oneAPI) that targets C++ as the primary host language for accelerator kernels.

  - id: cpp-src-013
    title: llama.cpp - LLM inference in C/C++
    publisher: ggerganov / community
    type: official_tooling_documentation
    url: https://github.com/ggerganov/llama.cpp
    notes: Reference local-inference runtime for LLMs, implemented in C/C++.

  - id: cpp-src-014
    title: ONNX Runtime - C++ API
    publisher: Microsoft / ONNX Runtime project
    type: official_tooling_documentation
    url: https://onnxruntime.ai/docs/api/c/
    notes: Documents the C++ API of ONNX Runtime as a primary binding.

  - id: cpp-src-015
    title: CUDA, ROCm/HIP, SYCL, oneAPI host-language documentation
    publisher: NVIDIA / AMD / Intel
    type: official_documentation
    url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/
    notes: Accelerator host APIs primarily target C++ (CUDA C++, HIP C++, SYCL C++, oneAPI C++).

  - id: cpp-src-016
    title: C++ AI agent-ecosystem absence note
    publisher: community
    type: official_tooling_documentation
    url: https://github.com/llama-cpp-python
    notes: Documents that C++ AI integration is overwhelmingly mediated by Python bindings rather than first-party C++ SDKs.

  - id: cpp-src-017
    title: librdkafka - Apache Kafka C/C++ client
    publisher: Confluent
    type: official_tooling_documentation
    url: https://github.com/confluentinc/librdkafka
    notes: Production-grade C/C++ Kafka client.

  - id: cpp-src-018
    title: nlohmann/json - JSON for Modern C++
    publisher: nlohmann/json project
    type: official_tooling_documentation
    url: https://github.com/nlohmann/json
    notes: Documents nlohmann/json as the most widely used C++ JSON library with ADL-based type mapping.

  - id: cpp-src-019
    title: ISO C++ - Standards and ecosystem
    publisher: isocpp.org
    type: official_documentation
    url: https://isocpp.org/std/the-standard
    notes: ISO C++ standardization site; no canonical LLM SDK or structured-output library is endorsed at the standard level.

  - id: cpp-src-020
    title: llama.cpp - GBNF grammars and JSON Schema
    publisher: ggerganov / llama.cpp project
    type: official_tooling_documentation
    url: https://github.com/ggerganov/llama.cpp/blob/master/grammars/README.md
    notes: Documents llama.cpp GBNF grammars and the json-schema-to-grammar conversion for constrained decoding.

  - id: cpp-src-021
    title: P2996 - Reflection for C++26
    publisher: ISO C++ committee
    type: language_specification
    url: https://wg21.link/P2996
    notes: Documents the in-progress reflection proposal for C++; standard C++ has no native runtime/compile-time reflection today.

  - id: cpp-src-022
    title: "llama.cpp GitHub Insights"
    publisher: "llama.cpp / Georgi Gerganov"
    type: official_documentation
    url: https://github.com/ggerganov/llama.cpp/graphs/contributors
    notes: "llama.cpp contributor graph shows Georgi Gerganov as the dominant committer despite hundreds of contributors."

  - id: cpp-src-023
    title: "nlohmann/json GitHub Insights"
    publisher: "nlohmann/json / Niels Lohmann"
    type: official_documentation
    url: https://github.com/nlohmann/json/graphs/contributors
    notes: "nlohmann/json contributor history shows Niels Lohmann as the dominant maintainer."

  - id: cpp-src-024
    title: "NVIDIA CUDA Documentation"
    publisher: "NVIDIA"
    type: official_documentation
    url: https://docs.nvidia.com/cuda/
    notes: "CUDA is NVIDIA-stewarded as a commercial-first-party platform."

  - id: cpp-src-025
    title: "ONNX Runtime Repository"
    publisher: "Microsoft"
    type: official_documentation
    url: https://github.com/microsoft/onnxruntime
    notes: "ONNX Runtime is Microsoft-shipped; for C++ as a language ecosystem it counts as commercial-first-party."

  - id: cpp-src-026
    title: "librdkafka Repository"
    publisher: "Confluent"
    type: official_documentation
    url: https://github.com/confluentinc/librdkafka
    notes: "Confluent maintains librdkafka as a commercial OSS project."

  - id: cpp-src-027
    title: "ISO C++ Committee"
    publisher: "ISO C++ Committee"
    type: official_documentation
    url: https://isocpp.org/std/the-committee
    notes: "WG21 papers list does not include AI/ML-specific proposals beyond accelerator-host generic concerns."
