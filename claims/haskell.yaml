claims:
  - id: haskell-001
    claim: Haskell is a pure functional language with non-strict (lazy) evaluation as defined by the Haskell 2010 Language Report.
    dimension: machine_cognition
    criterion: semantic_clarity
    evidence_type: language_specification
    confidence: high
    polarity: positive
    source: haskell-src-001
    notes: The Haskell 2010 Report defines Haskell's purity and non-strict evaluation as core language properties.

  - id: haskell-002
    claim: Haskell uses Hindley-Milner-style type inference to infer types for top-level and local bindings.
    dimension: machine_cognition
    criterion: type_system_strength
    evidence_type: language_specification
    confidence: high
    polarity: positive
    source: haskell-src-001
    notes: The Haskell 2010 Report specifies the type-inference algorithm at the heart of the language.

