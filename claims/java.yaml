    claim: Java's long-term backward compatibility commitment slows removal of legacy APIs and deprecated mechanisms, producing a large standard library surface where modern (records, sealed types) and legacy (raw types, Vector, Date) idioms coexist, raising cognitive load on greenfield code review.
