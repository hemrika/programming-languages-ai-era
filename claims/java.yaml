    criterion: conceptual_economy
    evidence_type: official_documentation
    confidence: medium
    polarity: negative
    source: java-src-011
    notes: The Java Compatibility Guide preserves API stability across releases; deprecated-but-not-removed APIs in the standard library mean greenfield codebases still encounter legacy idioms in dependencies and tutorials.
    counters: [java-008]
