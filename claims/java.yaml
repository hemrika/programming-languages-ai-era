    criterion: expressiveness
    evidence_type: language_specification
    confidence: medium
    polarity: negative
    source: java-src-001
    notes: The Java Language Specification defines single-class inheritance; default methods and the Diamond rule create patterns rather than direct composition primitives, increasing ceremony for crosscutting reuse.
    counters: [java-012]

