  - id: cpp-013
    claim: The dominant accelerator and heterogeneous-compute toolchains - NVIDIA CUDA, AMD ROCm/HIP, Khronos SYCL, and Intel oneAPI - all primarily target C++ as their host language for kernels and host code.
    dimension: runtime_ecosystem
    criterion: ecosystem_viability
    evidence_type: official_documentation
    confidence: high
    polarity: positive
    source: cpp-src-012
    notes: NVIDIA's CUDA C++ Programming Guide, AMD's HIP/ROCm documentation, the Khronos SYCL specification, and Intel's oneAPI all foreground C++ as the primary host language; under greenfield framing this is a forward production-relevance property a new accelerator project would inherit today.

  - id: cpp-014
    claim: Accelerator C++ dialects (CUDA C++, HIP, SYCL, oneAPI) diverge from ISO C++ in language extensions, runtime APIs, and supported standard-library subsets; portability across vendors is incomplete and code targeting one accelerator typically requires modification for another.
    dimension: runtime_ecosystem
    criterion: ecosystem_viability
    evidence_type: official_documentation
    confidence: high
    polarity: negative
    source: cpp-src-012
    notes: The CUDA C++ Programming Guide enumerates host/device language differences, restricted standard-library subsets on device code, and CUDA-specific runtime APIs; analogous divergences exist for HIP, SYCL, and oneAPI, so cross-vendor accelerator portability remains a manual porting concern.
    counters: [cpp-013]

  - id: cpp-015
