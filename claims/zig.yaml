claims:
  - id: zig-001
    claim: Zig is designed to have no hidden control flow, no hidden memory allocations, and no operator overloading.
    dimension: human_cognition
    criterion: local_reasoning
    evidence_type: language_specification
    confidence: high
    polarity: positive
    source: zig-src-002
    notes: The Why Zig page enumerates these design principles as core to Zig's explicitness.

  - id: zig-002
    claim: Zig requires memory allocators to be passed explicitly to functions that allocate.
    dimension: machine_cognition
    criterion: semantic_clarity
    evidence_type: language_specification
    confidence: high
    polarity: positive
    source: zig-src-009
    notes: The allocator chapter documents the explicit-allocator pattern across the standard library.

  - id: zig-003
    claim: Zig provides a unified comptime mechanism for compile-time evaluation that subsumes generics, conditional compilation, and macro-style metaprogramming.
    dimension: machine_cognition
    criterion: type_system_strength
    evidence_type: language_specification
    confidence: high
    polarity: positive
    source: zig-src-006
    notes: The comptime chapter documents compile-time evaluation as a unifying mechanism.

  - id: zig-004
    claim: Zig provides first-class C interoperability including direct import of C headers via @cImport.
    dimension: runtime_ecosystem
    criterion: interop
    evidence_type: language_specification
    confidence: high
    polarity: positive
    source: zig-src-007
    notes: The C interop section documents @cImport and ABI-compatible C function calling.

  - id: zig-005
    claim: Zig treats cross-compilation as a first-class use case supported out of the box.
    dimension: runtime_ecosystem
    criterion: deployment_model
    evidence_type: language_specification
    confidence: high
    polarity: positive
    source: zig-src-008
    notes: The Zig overview foregrounds cross-compilation as a design priority.

  - id: zig-006
    claim: Zig is pre-1.0 and continues to evolve language and standard-library surface across releases.
    dimension: strategic_viability
    criterion: backward_compatibility
    evidence_type: official_documentation
    confidence: high
    polarity: negative
    source: zig-src-005
    notes: The Zig 0.13 release notes confirm continued pre-1.0 evolution.

  - id: zig-007
    claim: Zig is stewarded by the Zig Software Foundation, a non-profit organization.
    dimension: strategic_viability
    criterion: governance_quality
    evidence_type: official_governance_documentation
    confidence: high
    polarity: positive
    source: zig-src-010
    notes: The ZSF About page identifies the foundation's role in stewarding Zig development.

  - id: zig-008
    claim: Zig 0.12 introduced a new package manager and build-system improvements.
