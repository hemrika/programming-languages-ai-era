    criterion: dependency_clarity
    evidence_type: official_documentation
    confidence: high
    polarity: positive
    source: zig-src-004
    notes: The 0.12.0 release notes document package manager and build system changes.

  - id: zig-009
    claim: Zig does not provide compile-time memory-safety guarantees comparable to Rust's borrow checker.
    dimension: runtime_ecosystem
    criterion: security_posture
    evidence_type: language_specification
    confidence: high
    polarity: negative
    source: zig-src-002
