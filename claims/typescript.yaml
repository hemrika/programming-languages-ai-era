  - id: typescript-017
    claim: TypeScript's type system is intentionally not sound; type assertions, function bivariance in some positions, and unchecked casts allow runtime values to diverge from their declared types.
    dimension: machine_cognition
    criterion: type_system_strength
    evidence_type: official_documentation
    confidence: high
    polarity: negative
    source: typescript-src-014
    notes: The TypeScript design goals explicitly state the type system is not sound and trade soundness for productivity in interop with JavaScript; this means static guarantees can be voided at runtime even without explicit any.
    counters: [typescript-001, typescript-002, typescript-003, typescript-016]

  - id: typescript-018
    claim: TypeScript types are erased at compile time and have no runtime representation, so structural-type guarantees do not survive boundary crossings such as JSON parsing, third-party API responses, or dynamic plugin loading without runtime validation.
    dimension: runtime_ecosystem
    criterion: performance_predictability
    evidence_type: official_documentation
    confidence: high
    polarity: negative
    source: typescript-src-001
    notes: The TypeScript Handbook describes type erasure during compilation; runtime data validation requires libraries such as zod or io-ts that re-encode the type at runtime.
    counters: [typescript-001, typescript-003]

