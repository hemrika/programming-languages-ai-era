claims:
  - id: typescript-001
    claim: TypeScript adds an optional static type layer over JavaScript and erases types during compilation to JavaScript.
    dimension: machine_cognition
    criterion: static_analyzability
    evidence_type: official_documentation
    confidence: high
    polarity: positive
    source: typescript-src-001
    notes: The Handbook describes TypeScript as a typed superset that compiles to plain JavaScript with types erased at runtime.

