claims:
  - id: typescript-001
    claim: TypeScript adds an optional static type layer over JavaScript and erases types during compilation to JavaScript.
    dimension: machine_cognition
    criterion: static_analyzability
    evidence_type: official_documentation
    confidence: high
    polarity: positive
    source: typescript-src-001
    notes: The Handbook describes TypeScript as a typed superset that compiles to plain JavaScript with types erased at runtime.

  - id: typescript-002
    claim: TypeScript supports discriminated unions that allow exhaustive case handling through control-flow narrowing.
    dimension: machine_cognition
    criterion: type_system_strength
    evidence_type: official_documentation
    confidence: high
    polarity: positive
    source: typescript-src-003
    notes: The Narrowing chapter documents discriminant properties and the never type for exhaustiveness checks.

  - id: typescript-003
    claim: TypeScript uses structural typing so types are compatible based on shape rather than nominal declaration.
    dimension: machine_cognition
    criterion: semantic_clarity
    evidence_type: official_documentation
    confidence: high
    polarity: positive
    source: typescript-src-005
    notes: The Type Compatibility chapter establishes the structural model and contrasts it with nominal systems.

  - id: typescript-004
    claim: TypeScript's strict mode bundles strict family flags including strictNullChecks and noImplicitAny as opt-in defaults.
    dimension: machine_cognition
    criterion: static_analyzability
    evidence_type: official_tooling_documentation
    confidence: high
    polarity: positive
    source: typescript-src-004
    notes: The TSConfig reference enumerates the strict family and confirms strict mode is not on by default.

  - id: typescript-005
    claim: TypeScript's any type opts a value out of static type checking.
    dimension: machine_cognition
    criterion: type_system_strength
    evidence_type: official_documentation
    confidence: high
    polarity: negative
    source: typescript-src-008
    notes: The Handbook explicitly states that any disables further type checking for that value.

