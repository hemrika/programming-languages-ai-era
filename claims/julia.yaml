claims:
  - id: julia-001
    claim: Julia is designed as a high-level, high-performance dynamic language for technical computing.
    dimension: runtime_ecosystem
    criterion: performance_ceiling
    evidence_type: official_documentation
    confidence: high
    polarity: positive
    source: julia-src-001
    notes: The Julia introduction frames the language's design goal of bridging high-level expressiveness and performance.

  - id: julia-002
    claim: Julia uses multiple dispatch as the central abstraction for selecting method implementations based on the runtime types of all arguments.
    dimension: human_cognition
    criterion: expressiveness
    evidence_type: official_documentation
    confidence: high
    polarity: positive
    source: julia-src-002
    notes: The Methods chapter documents multiple dispatch on argument types.

  - id: julia-003
    claim: The Julia foundational paper describes multiple dispatch combined with type inference as enabling generic library composition with high-performance specialized code.
    dimension: runtime_ecosystem
    criterion: library_maturity
    evidence_type: academic_paper
    confidence: high
    polarity: positive
    source: julia-src-003
    notes: The 2017 SIAM Review paper articulates the Julia design rationale and its consequences for ecosystem composition.

  - id: julia-004
    claim: Julia 1.9 introduced native code caching that reduces time-to-first-execution for many packages.
    dimension: ai_agent_operability
    criterion: fast_feedback_loops
    evidence_type: official_documentation
    confidence: high
    polarity: positive
    source: julia-src-004
    notes: The Julia 1.9 highlights blog explicitly documents native code caching and TTFX improvements.

  - id: julia-005
    claim: Julia 1.10 shipped a Julia-based parser rewrite and additional performance improvements.
